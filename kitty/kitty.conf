
# ~/.config/kitty/kitty.conf

# Import Aether colors
include ~/.config/aether/theme/kitty.conf

# Window
background_opacity 0.98

# Remove titlebar/borders
hide_window_decorations yes

# Font
font_family JetBrainsMono Nerd Font
bold_font JetBrainsMono Nerd Font
italic_font JetBrainsMono Nerd Font
bold_italic_font JetBrainsMono Nerd Font

font_size 12.0

# Bell
enable_audio_bell no
visual_bell_duration 0

# Cursor
cursor_shape block
cursor_blink_interval 0

# Scrolling
scrollback_lines 10000

# Performance
sync_to_monitor yes

# Optional: make Kitty look more like Alacritty
window_padding_width 0
confirm_os_window_close 0

